<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <style>
        :root{--bg:#0f1720;--card:#0b1220;--accent:#06b6d4;--muted:#9aa4b2}
        html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#071025 0%,#0b1a2a 100%);color:#e6eef6}
        .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
        .card{background:rgba(255,255,255,0.03);padding:24px;border-radius:12px;max-width:520px;width:100%;box-shadow:0 6px 30px rgba(2,6,23,0.6)}
        h1{margin:0 0 12px;font-size:24px}
        .controls{display:flex;gap:12px;margin:12px 0}
        button.choice{flex:1;padding:12px;border-radius:8px;border:0;background:#10233a;color:#e6eef6;font-size:16px;cursor:pointer;transition:transform .08s ease,box-shadow .08s}
        button.choice:active{transform:translateY(1px)}
        .status{display:flex;gap:14px;align-items:center;margin-top:14px}
        .box{background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;flex:1;text-align:center}
        .big{font-size:20px;font-weight:600}
        .muted{color:var(--muted);font-size:13px}
        .result{margin-top:14px;padding:12px;border-radius:8px;text-align:center;font-weight:700}
        .win{background:linear-gradient(90deg,#064e3b33,#16a34a22);color:#bbf7d0}
        .lose{background:linear-gradient(90deg,#5b021333,#ef444422);color:#ffd6d6}
        .draw{background:rgba(255,255,255,0.03);color:#e6eef6}
        .score{display:flex;gap:8px;justify-content:center;margin-top:12px}
        .score .s{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,0.02)}
        .footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
        .btn-reset{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
        @media (max-width:480px){.controls{flex-direction:column}}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>가위바위보</h1>
            <div class="muted">아래에서 선택하세요 — 컴퓨터와 겨룹니다.</div>

            <div class="controls" role="group" aria-label="choices">
                <button class="choice" data-choice="가위">✌️ 가위</button>
                <button class="choice" data-choice="바위">✊ 바위</button>
                <button class="choice" data-choice="보">🖐️ 보</button>
            </div>

            <div class="status">
                <div class="box">
                    <div class="muted">내 선택</div>
                    <div id="playerChoice" class="big">-</div>
                </div>
                <div class="box">
                    <div class="muted">컴퓨터</div>
                    <div id="computerChoice" class="big">-</div>
                </div>
            </div>

            <div id="result" class="result draw">선택하세요</div>

            <div class="score">
                <div class="s">플레이어: <span id="playerScore">0</span></div>
                <div class="s">무승부: <span id="draws">0</span></div>
                <div class="s">컴퓨터: <span id="computerScore">0</span></div>
            </div>

            <div class="footer">
                <div class="muted">간단한 연습용</div>
                <button id="reset" class="btn-reset">초기화</button>
            </div>
        </div>
    </div>

    <script>
        const choices = ['가위','바위','보'];
        const beats = { '가위':'보', '바위':'가위', '보':'바위' };

        const playerChoiceEl = document.getElementById('playerChoice');
        const computerChoiceEl = document.getElementById('computerChoice');
        const resultEl = document.getElementById('result');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const drawsEl = document.getElementById('draws');

        let playerScore = 0, computerScore = 0, draws = 0;

        function compPick(){
            return choices[Math.floor(Math.random()*choices.length)];
        }

        function decide(player, comp){
            if(player === comp) return 'draw';
            return beats[player] === comp ? 'win' : 'lose';
        }

        function updateDisplay(player, comp, outcome){
            playerChoiceEl.textContent = player;
            computerChoiceEl.textContent = comp;
            resultEl.className = 'result';
            if(outcome === 'win'){ resultEl.textContent = '이겼습니다!'; resultEl.classList.add('win'); }
            else if(outcome === 'lose'){ resultEl.textContent = '졌습니다...'; resultEl.classList.add('lose'); }
            else { resultEl.textContent = '비겼습니다.'; resultEl.classList.add('draw'); }

            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
            drawsEl.textContent = draws;
        }

        document.querySelectorAll('button.choice').forEach(btn=>{
            btn.addEventListener('click', e=>{
                const player = btn.dataset.choice;
                const comp = compPick();
                const outcome = decide(player, comp);

                if(outcome === 'win') playerScore++;
                else if(outcome === 'lose') computerScore++;
                else draws++;

                updateDisplay(player, comp, outcome);
            });
        });

        document.getElementById('reset').addEventListener('click', ()=>{
            playerScore = 0; computerScore = 0; draws = 0;
            playerChoiceEl.textContent = '-';
            computerChoiceEl.textContent = '-';
            updateDisplay('-', '-', 'draw');
        });

        // 초기 화면 세팅
        updateDisplay('-', '-', 'draw');
    </script>
</body>
</html>
